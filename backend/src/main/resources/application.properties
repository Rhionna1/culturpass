# FunctionPass backend API
spring.application.name=functionpass
spring.datasource.url=jdbc:postgresql://localhost:5432/culturpass_dev
spring.datasource.username=culturpass_user
spring.datasource.password=culturpass_pass

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.security.user.password=disabled

# JWT secret key ? override this with environment variable in production
app.jwt.secret=${JWT_SECRET:functionpass-secret-key-must-be-at-least-256-bits-long-for-security}
