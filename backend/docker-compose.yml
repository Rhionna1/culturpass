version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: culturpass_db
    environment:
      POSTGRES_DB: culturpass_dev
      POSTGRES_USER: culturpass_user
      POSTGRES_PASSWORD: culturpass_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: